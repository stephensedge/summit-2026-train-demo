---
replicaCount: 1

image:
  repository: docker.io/library/eclipse-mosquitto
  tag: "2.0"
  pullPolicy: IfNotPresent

mosquitto:
  allowAnonymous: true

# What IP to use
service:
  type: LoadBalancer
  port: 1883
  targetPort: 1883
  loadBalancerIP: 192.168.100.30

# The specific IPAddressPool configured in MetalLB to pull the IP from
metallb:
  addressPool: mqtt-pool