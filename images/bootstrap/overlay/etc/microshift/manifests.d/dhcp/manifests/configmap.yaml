---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dhcp-configmap
data: 
  dnsmasq.conf: |
    dhcp-range=10.26.100.200,10.26.100.250,1h
    dhcp-option=option:router,10.26.100.1
    dhcp-option=option:dns-server,10.26.100.1
    dhcp-authoritative
    log-queries
    log-dhcp
    dhcp-no-override
    port=10053
    interface=INTERNAL_INTERFACE
    dhcp-boot=pxelinux.0,external-tftp,10.26.100.1
    dhcp-option=66,10.26.100.1
    dhcp-option=67,pxelinux.0