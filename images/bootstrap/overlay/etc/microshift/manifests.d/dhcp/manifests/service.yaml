---
apiVersion: v1
kind: Service
metadata:
  name: dhcp
  labels:
    app.kubernetes.io/name: dhcp
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: dhcp
    app.kubernetes.io/part-of: bootstrap
spec:
  clusterIP: None 
  selector:
    app.kubernetes.io/name: dhcp
    app.kubernetes.io/component: dhcp
  ports:
    - name: dhcp-port
      port: 67
      protocol: UDP
      targetPort: 67