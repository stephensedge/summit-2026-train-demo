---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dhcp
  labels:
    app.kubernetes.io/name: dhcp
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: dhcp
    app.kubernetes.io/part-of: bootstrap
spec:
  replicas: 1
  serviceName: "dhcp"
  selector:
    matchLabels:
      app.kubernetes.io/name: dhcp
      app.kubernetes.io/component: dhcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dhcp
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: dhcp
        app.kubernetes.io/part-of: bootstrap
    spec:
      terminationGracePeriodSeconds: 10
      serviceAccountName: dhcp-sa
      hostNetwork: true
      containers:
        - name: dhcp
          image: localhost/dhcp:latest 
          securityContext:
            privileged: true
          ports:
            - containerPort: 67
              name: dhcp-port
          volumeMounts:
            - name: dhcp-config
              mountPath: /etc/dnsmasq.conf
              subPath: dnsmasq.conf
      volumes:
        - name: dhcp-config
          configMap:
            name: dhcp-configmap