---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: registry
  annotations:
    haproxy.router.openshift.io/set-forwarded-headers: "append"
    haproxy.router.openshift.io/timeout: "60m"
spec:
  to:
    kind: Service
    name: harbor
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge 
    insecureEdgeTerminationPolicy: Allow