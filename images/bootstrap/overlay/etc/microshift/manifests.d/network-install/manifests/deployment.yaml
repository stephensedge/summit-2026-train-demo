---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pubsrv
  labels:
    app.kubernetes.io/name: pubsrv
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: pubsrv
    app.kubernetes.io/part-of: bootstrap
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pubsrv
      app.kubernetes.io/component: pubsrv
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pubsrv
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: pubsrv
        app.kubernetes.io/part-of: bootstrap
    spec:
      terminationGracePeriodSeconds: 10
      initContainers:
        - name: download-files
          image: registry.redhat.io/ubi9/httpd-24:9.7
          imagePullPolicy: IfNotPresent
          command:
          - sh
          - -c
          - |
            set -e
            for i in kubeconfig kubeadmin-password agent.x86_64-rootfs.img; do
                echo "Downloading $i..."
                curl --fail --retry 10 --retry-all-errors --retry-delay 3 \
                     --output /pubsrv/"$i" \
                     http://install-resources.network-install.svc.cluster.local:8080/pubsrv/"$i" || { echo "Failed to download $i"; exit 1; }
            done
            echo "All files downloaded successfully."
          volumeMounts:
            - name: pubsrv
              mountPath: /pubsrv
      containers:
        - name: pubsrv
          image: registry.redhat.io/ubi9/httpd-24:9.7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: pubsrv
              mountPath: /var/www/html
      volumes:
        - name: pubsrv
          persistentVolumeClaim:
            claimName: pubsrv