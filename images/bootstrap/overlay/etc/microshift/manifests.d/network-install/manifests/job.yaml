---
apiVersion: batch/v1
kind: Job
metadata:
  name: setup-network-install
  labels:
    app.kubernetes.io/name: setup-network-install
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: setup-network-install
    app.kubernetes.io/part-of: bootstrap
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: setup-network-install
        app.kubernetes.io/part-of: bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ansible-runner
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: playbook
          configMap:
            name: create-ocp-pxe-boot-files
        - name: agent-config
          configMap:
            name: agent-config
            items:
              - key: agent-config.yaml
                path: agent-config.yaml
        - name: install-config
          configMap:
            name: install-config
            items:
              - key: install-config.yaml
                path: install-config.yaml
        - name: additional-manifests
          configMap:
            name: additional-manifests
        - name: tftpboot
          persistentVolumeClaim:
            claimName: tftpboot
        - name: pubsrv
          persistentVolumeClaim:
            claimName: pubsrv
        - name: install-scratch
          emptyDir: {}
        - name: ansible-scratch
          emptyDir: {}
        - name: installer-cache
          emptyDir: {}
      containers:
        - name: create-pxe-files
          image: localhost/execution-environment:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              ansible-playbook /playbooks/create-ocp-pxe-boot-files.yaml --inventory localhost, -vv
          volumeMounts:
            - name: playbook
              mountPath: /playbooks
            - name: agent-config
              mountPath: /tmp/input/agent-config.yaml
              subPath: agent-config.yaml
            - name: install-config
              mountPath: /tmp/input/install-config.yaml
              subPath: install-config.yaml
            - name: additional-manifests
              mountPath: /tmp/input/additional-manifests
            - name: install-scratch
              mountPath: /tmp/install
            - name: ansible-scratch
              mountPath: /.ansible
            - name: installer-cache
              mountPath: /.cache
            - name: tftpboot
              mountPath: /tftpboot
            - name: pubsrv
              mountPath: /pubsrv