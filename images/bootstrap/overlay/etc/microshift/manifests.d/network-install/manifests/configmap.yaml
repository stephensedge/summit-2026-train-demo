  9904-postinall-nmstate.yaml: |
    ---
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: install-nmstate
      namespace: post-install
    spec:
      template:
        spec:
          serviceAccountName: post-install-sa
          restartPolicy: OnFailure
          containers:
          - name: installer
            image: registry.redhat.io/openshift4/ose-cli:latest
            command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              echo "Waiting for NMstate CRD to be available..."
              timeout=7200
              interval=10
              elapsed=0
              
              while ! oc get crd nmstates.nmstate.io > /dev/null 2>&1; do
                if [ $elapsed -ge $timeout ]; then
                  echo "Timed out waiting for NMstate CRD."
                  exit 1
                fi
                echo "CRD not found yet. Waiting ${interval}s..."
                sleep $interval
                elapsed=$((elapsed + interval))
              done

              echo "NMstate CRD found, applying NMstate..."
              sleep 10
              cat <<EOF | oc apply -f -
              ---
              apiVersion: nmstate.io/v1
              kind: NMState
              metadata:
                name: nmstate
              ---
              apiVersion: nmstate.io/v1
              kind: NodeNetworkConfigurationPolicy
              metadata:
                name: node0-storage-interface
              spec:
                nodeSelector:
                  kubernetes.io/hostname: "node0" 
                desiredState:
                  interfaces:
                    - name: NODE0_STORAGE_INTERFACE
                      type: ethernet
                      state: up
                      ipv4:
                        address:
                          - ip: NODE0_STORAGE_IP_ADDRESS
                            prefix-length: 24
                        enabled: true
                        dhcp: false
              ---
              apiVersion: nmstate.io/v1
              kind: NodeNetworkConfigurationPolicy
              metadata:
                name: node1-storage-interface
              spec:
                nodeSelector:
                  kubernetes.io/hostname: "node1" 
                desiredState:
                  interfaces:
                    - name: NODE1_STORAGE_INTERFACE
                      type: ethernet
                      state: up
                      ipv4:
                        address:
                          - ip: NODE1_STORAGE_IP_ADDRESS
                            prefix-length: 24
                        enabled: true
                        dhcp: false
              ---
              apiVersion: nmstate.io/v1
              kind: NodeNetworkConfigurationPolicy
              metadata:
                name: arbiter-storage-interface
              spec:
                nodeSelector:
                  kubernetes.io/hostname: "arbiter" 
                desiredState:
                  interfaces:
                    - name: ARBITER_STORAGE_INTERFACE
                      type: ethernet
                      state: up
                      ipv4:
                        address:
                          - ip: ARBITER_STORAGE_IP_ADDRESS
                            prefix-length: 24
                        enabled: true
                        dhcp: false
              EOF

              echo "NMstate applied successfully."
              echo "Pinning operator version..."

              oc patch subscription kubernetes-nmstate-operator -n openshift-nmstate --type merge -p '{"spec":{"installPlanApproval":"Manual"}}'

              echo "Operator version pinned."
  9905-postinstall-metallb.yaml: |
    ---
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: install-metallb
      namespace: post-install
    spec:
      template:
        spec:
          serviceAccountName: post-install-sa
          restartPolicy: OnFailure
          containers:
          - name: installer
            image: registry.redhat.io/openshift4/ose-cli:latest
            command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Waiting for CRDs to be available..."
              
              for crd in metallbs.metallb.io ipaddresspools.metallb.io l2advertisements.metallb.io; do
                echo "Checking $crd..."
                until oc get crd $crd >/dev/null 2>&1; do
                  echo "Waiting for CRD $crd to be registered by the Operator..."
                  sleep 15
                done
              done

              echo "MetalLB CRDs found, preparing MetalLB objects..."
              cat <<EOF > /tmp/metallb.yaml
              ---
              apiVersion: metallb.io/v1beta1
              kind: MetalLB
              metadata:
                name: metallb
                namespace: metallb-system
              ---
              apiVersion: metallb.io/v1beta1
              kind: IPAddressPool
              metadata:
                name: mqtt-pool
                namespace: metallb-system
              spec:
                addresses:
                - 192.168.100.30/32
                autoAssign: true
              ---
              apiVersion: metallb.io/v1beta1
              kind: L2Advertisement
              metadata:
                name: mqtt-l2-advertisement
                namespace: metallb-system
              spec:
                ipAddressPools:
                - mqtt-pool
              EOF

              echo "Applying MetalLB manifests..."
              while ! oc apply -f /tmp/metallb.yaml; do
                echo "Failed to apply MetalLB manifests (API might be temporarily down). Retrying in 15s..."
                sleep 15
              done
              echo "MetalLB manifests applied successfully."

              echo "Pinning operator version..."

              oc patch subscription metallb-operator -n metallb-system --type merge -p '{"spec":{"installPlanApproval":"Manual"}}'

              echo "Operator version pinned."
  9999-postinstall-job.yaml: |
    ---
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: apply-tuning-and-storage
      namespace: post-install
    spec:
      backoffLimit: 25
      template:
        spec:
          serviceAccountName: post-install-sa
          restartPolicy: OnFailure
          containers:
          - name: apply-manifests
            image: registry.redhat.io/openshift4/ose-cli:latest
            command:
            - /bin/bash
            - -c
            - |
              # Function to check if all Cluster Operators have settled
              wait_for_operators() {
                while true; do
                  # 1. Check if API is up and operators exist
                  CO_COUNT=$(oc get clusteroperator -o name 2>/dev/null | wc -l)
                  CO_COUNT=$(echo $CO_COUNT | xargs)
                  
                  if [ "$CO_COUNT" -eq 0 ]; then
                    echo "API server is down or unreachable. Waiting 15s..."
                    sleep 15
                    continue
                  fi

                  # 2. Count the number of operators in undesirable states
                  UNAVAILABLE=$(oc get clusteroperator -o jsonpath='{.items[*].status.conditions[?(@.type=="Available")].status}' 2>/dev/null | grep -o "False" | wc -l)
                  PROGRESSING=$(oc get clusteroperator -o jsonpath='{.items[*].status.conditions[?(@.type=="Progressing")].status}' 2>/dev/null | grep -o "True" | wc -l)
                  DEGRADED=$(oc get clusteroperator -o jsonpath='{.items[*].status.conditions[?(@.type=="Degraded")].status}' 2>/dev/null | grep -o "True" | wc -l)
                  
                  # Trim whitespace
                  UNAVAILABLE=$(echo $UNAVAILABLE | xargs)
                  PROGRESSING=$(echo $PROGRESSING | xargs)
                  DEGRADED=$(echo $DEGRADED | xargs)

                  if [ "$UNAVAILABLE" -eq 0 ] && [ "$PROGRESSING" -eq 0 ] && [ "$DEGRADED" -eq 0 ]; then
                    echo "All $CO_COUNT Cluster Operators are settled (Available=True, Progressing=False, Degraded=False)."
                    break
                  fi
                  
                  echo "Operators not yet settled -> Unavailable: $UNAVAILABLE | Progressing: $PROGRESSING | Degraded: $DEGRADED. Waiting 15s..."
                  sleep 15
                done
              }

              echo "Waiting for initial Cluster Operator stabilization..."
              wait_for_operators
              
              echo "Preparing PerformanceProfile manifest..."
              cat <<EOF > /tmp/tuning.yaml
              ---
              apiVersion: performance.openshift.io/v2
              kind: PerformanceProfile
              metadata:
                name: masters-performanceprofile
                annotations:
                  kubeletconfig.experimental: |
                    {"podsPerCore": 0, "maxPods": 500, "systemReserved": {"memory": "2Gi"}}
              spec:
                cpu:
                  isolated: "1-7,9-15"
                  reserved: "0,8"
                machineConfigPoolSelector:
                  pools.operator.machineconfiguration.openshift.io/master: ""
                nodeSelector:
                  node-role.kubernetes.io/master: ''
                numa:
                  topologyPolicy: "restricted"
                realTimeKernel:
                  enabled: false
                workloadHints:
                  realTime: false
                  highPowerConsumption: false
                  perPodPowerManagement: false
              ---
              apiVersion: machineconfiguration.openshift.io/v1
              kind: KubeletConfig
              metadata:
                name: 09-arbiter-kubeletconfig
              spec:
                machineConfigPoolSelector:
                  matchLabels:
                    pools.operator.machineconfiguration.openshift.io/arbiter: ""
                kubeletConfig:
                  systemReserved:
                    memory: 2Gi
              EOF

              echo "Applying tuning..."
              # 3. Retry loop for the apply command in case API drops right at this moment
              while ! oc apply -f /tmp/tuning.yaml; do
                echo "Failed to apply tuning (API might be temporarily down). Retrying in 15s..."
                sleep 15
              done
              echo "Tuning applied successfully."

              # 4. Wait for the MachineConfigOperator to pick up the changes and start progressing
              echo "Waiting 60s for MachineConfigOperator to evaluate the new PerformanceProfile and start updating nodes..."
              sleep 60

              # 5. Wait for nodes to reboot and operators to settle again
              echo "Waiting for all Cluster Operators to stabilize after node reboots..."
              wait_for_operators

              echo "Preparing StorageCluster manifest..."
              cat <<EOF > /tmp/storagecluster.yaml
              ---
              apiVersion: core.libopenstorage.org/v1
              kind: StorageCluster
              metadata:
                name: px-cluster
                namespace: portworx
                annotations:
                  portworx.io/is-openshift: "true"
                  portworx.io/misc-args: "-T px-storev2 -rt_opts small_conf=1"
                  portworx.io/health-check: "skip"
                  portworx.io/preflight-check: "skip"
              spec:
                network:
                  dataInterface: NODE0_STORAGE_INTERFACE
                deleteStrategy:
                  type: UninstallAndWipe
                image: portworx/oci-monitor:3.5.2
                kvdb:
                  internal: true
                stork:
                  enabled: true
                csi:
                  enabled: true
                placement:
                  tolerations:
                  - key: "node-role.kubernetes.io/arbiter"
                    operator: Exists
                    effect: NoSchedule
                  - key: "node-role.kubernetes.io/master"
                    operator: Exists
                    effect: NoSchedule
                  - key: "node-role.kubernetes.io/control-plane"
                    operator: Exists
                    effect: NoSchedule
                nodes:
                  # ==========================================
                  # 1. Primary Node 0 (Data and KVDB member 1)
                  # ==========================================
                  - selector:
                      nodeName: "node0"  # Replace with actual hostname
                    clusterDomain: "site-a"
                    storage:
                      devices:
                        - "/dev/disk/by-partlabel/px-data"
                      systemMetadataDevice: "/dev/disk/by-partlabel/px-metadata"
                  
                  # ==========================================
                  # 2. Primary Node 1 (Data and KVDB member 2)
                  # ==========================================
                  - selector:
                      nodeName: "node1"  # Replace with actual hostname
                    clusterDomain: "site-b"
                    storage:
                      devices:
                        - "/dev/disk/by-partlabel/px-data"
                      systemMetadataDevice: "/dev/disk/by-partlabel/px-metadata"

                  # ==========================================
                  # 3. Arbiter Node (Storageless KVDB tie-breaker)
                  # ==========================================
                  - selector:
                      nodeName: "arbiter"  # Replace with actual Arbiter hostname
                    storageless: true
                    clusterDomain: "witness"
                    storage:
                      kvdbDevice: "/dev/disk/by-partlabel/px-metadata"
              EOF

              echo "Applying StorageCluster..."
              while ! oc apply -f /tmp/storagecluster.yaml; do
                echo "Failed to apply StorageCluster (API might be temporarily down). Retrying in 15s..."
                sleep 15
              done
              
              echo "StorageCluster applied successfully."
              
              echo "Preparing ArgoCD manifest..."
              cat <<EOF > /tmp/argocd.yaml
              ---
              apiVersion: argoproj.io/v1beta1
              kind: ArgoCD
              metadata:
                name: openshift-gitops
                namespace: openshift-gitops
              spec:
                resourceHealthChecks:
                  - check: |
                      if obj.metadata.name == "flightctl-db-migration-1-dryrun" then
                        -- If the Job name is 'flightctl-db-migration-1-dryrun', always return a Healthy status immediately.
                        return {status = "Healthy", message = "Bypassing health check for specific Job 'flightctl-db-migration-1-dryrun' as requested."}
                      end

                      -- Standard logic for all other Jobs: check for completion or failure
                      if obj.status and obj.status.conditions then
                        for i, condition in ipairs(obj.status.conditions) do
                          if condition.type == "Complete" and condition.status == "True" then
                            return {status = "Healthy", message = "Job completed successfully"}
                          end
                          if condition.type == "Failed" and condition.status == "True" then
                            return {status = "Degraded", message = condition.message}
                          end
                        end
                      end

                      -- Default to Progressing if not complete/failed/ignored
                      return {status = "Progressing", message = "Job is running or waiting"}
                    group: batch
                    kind: Job
              EOF
              echo "Applying ArgoCD manifest..."
              while ! oc apply -f /tmp/argocd.yaml; do
                echo "Failed to apply ArgoCD manifest (API might be temporarily down). Retrying in 15s..."
                sleep 15
              done
              
              echo "ArgoCD manifest applied successfully."

              echo "Preparing RHEM manifest..."
              cat <<EOF > /tmp/rhem.yaml
              ---
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: rhem
                namespace: openshift-gitops
                labels:
                  application: rhem
                finalizers:
                  - resources-finalizer.argocd.argoproj.io
                  - post-delete-finalizer.argocd.argoproj.io
                  - post-delete-finalizer.argocd.argoproj.io/cleanup
              spec:
                syncPolicy:
                  syncOptions:
                    - CreateNamespace=true 
                  automated:
                    prune: true
                destination:
                  namespace: rhem
                  server: 'https://kubernetes.default.svc'
                ignoreDifferences:
                  - group: batch
                    jsonPointers:
                      - /spec
                      - /metadata/annotations
                      - /metadata/labels
                    kind: Job
                    name: flightctl-db-migration-1-dryrun
                project: default
                source:
                  chart: redhat-rhem
                  repoURL: quay.io/jswanson
                  targetRevision: 1.1.1
                  helm:
                    parameters:
                      - name: global.baseDomain
                        value: rhem.rhem.apps.acp.BASE_DNS_ZONE
                      - forceString: true
                        name: global.enableOpenShiftExtensions
                        value: 'true'
                      - forceString: true
                        name: global.enableMulticlusterExtensions
                        value: 'false'
                      - name: global.auth.openshift.authorizationUrl
                        value: 'https://oauth-openshift.apps.acp.BASE_DNS_ZONE/oauth/authorize'
                      - name: global.auth.openshift.tokenUrl
                        value: 'https://oauth-openshift.apps.acp.BASE_DNS_ZONE/oauth/token'
                      - name: global.auth.openshift.issuer
                        value: 'https://oauth-openshift.apps.acp.BASE_DNS_ZONE/oauth/authorize'
                      - name: global.generateCertificates
                        value: builtin
                      - name: global.storageClassName
                        value: px-csi-replicated
                      - name: global.auth.insecureSkipTlsVerify
                        value: true
              EOF

              echo "Applying RHEM manifest..."
              while ! oc apply -f /tmp/rhem.yaml; do
                echo "Failed to apply RHEM manifest (API might be temporarily down). Retrying in 15s..."
                sleep 15
              done

              echo "Preparing mqtt manifest..."
              cat <<EOF > /tmp/mqtt.yaml
              ---
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: mosquitto
                namespace: openshift-gitops
                labels:
                  application: mosquitto
                finalizers:
                  - resources-finalizer.argocd.argoproj.io
              spec:
                syncPolicy:
                  syncOptions:
                    - CreateNamespace=true 
                  automated:
                    prune: true
                destination:
                  namespace: mqtt
                  server: 'https://kubernetes.default.svc'
                project: default
                source:
                  chart: mosquitto
                  repoURL: quay.io/jswanson
                  targetRevision: 0.1.0
                  helm:
              EOF

              echo "Applying mqtt manifest..."
              while ! oc apply -f /tmp/mqtt.yaml; do
                echo "Failed to apply MQTT manifest (API might be temporarily down). Retrying in 15s..."
                sleep 15
              done

              echo "Post-install job complete."