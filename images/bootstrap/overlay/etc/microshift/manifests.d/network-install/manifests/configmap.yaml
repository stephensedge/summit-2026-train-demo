---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
data:
  agent-config.yaml: |
    ---
    apiVersion: v1beta1
    kind: AgentConfig
    metadata:
      name: acp
    rendezvousIP: NODE0_IP_ADDRESS
    hosts:
      - hostname: node0
        role: master
        interfaces:
          - name: NODE0_CLUSTER_INTERFACE
            macAddress: NODE0_CLUSTER_INTERFACE_MAC_ADDRESS
        rootDeviceHints:
          deviceName: NODE0_INSTALL_DEVICE
        networkConfig:
          interfaces:
          - name: NODE0_CLUSTER_INTERFACE
            type: ethernet
            state: up
            mac-address: NODE0_CLUSTER_INTERFACE_MAC_ADDRESS
            ipv4:
              enabled: true
              address:
                - ip: NODE0_IP_ADDRESS
                  prefix-length: 24
              dhcp: false
          - name: storage0
            identifier: mac-address
            mac-address: NODE0_STORAGE_INTERFACE_MAC_ADDRESS
            type: ethernet
            state: down
          dns-resolver:
            config:
              server:
                - ACP_DNS_SERVER
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: ACP_ROUTER_ADDRESS
                next-hop-interface: NODE0_CLUSTER_INTERFACE
                table-id: 254
      - hostname: node1
        role: master
        interfaces:
          - name: NODE1_CLUSTER_INTERFACE
            macAddress: NODE1_CLUSTER_INTERFACE_MAC_ADDRESS
        rootDeviceHints:
          deviceName: NODE1_INSTALL_DEVICE
        networkConfig:
          interfaces:
          - name: NODE1_CLUSTER_INTERFACE
            type: ethernet
            state: up
            mac-address: NODE1_CLUSTER_INTERFACE_MAC_ADDRESS
            ipv4:
              enabled: true
              address:
                - ip: NODE1_IP_ADDRESS
                  prefix-length: 24
              dhcp: false
          - name: storage0
            identifier: mac-address
            mac-address: NODE1_STORAGE_INTERFACE_MAC_ADDRESS
            type: ethernet
            state: down
          dns-resolver:
            config:
              server:
                - ACP_DNS_SERVER
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: ACP_ROUTER_ADDRESS
                next-hop-interface: NODE1_CLUSTER_INTERFACE
                table-id: 254
      - hostname: arbiter
        role: arbiter
        interfaces:
          - name: ARBITER_CLUSTER_INTERFACE
            macAddress: ARBITER_CLUSTER_INTERFACE_MAC_ADDRESS
        rootDeviceHints:
          serialNumber: ARBITER_INSTALL_DEVICE
        networkConfig:
          interfaces:
          - name: ARBITER_CLUSTER_INTERFACE
            type: ethernet
            state: up
            mac-address: ARBITER_CLUSTER_INTERFACE_MAC_ADDRESS
            ipv4:
              enabled: true
              address:
                - ip: ARBITER_IP_ADDRESS
                  prefix-length: 24
              dhcp: false
          - name: storage0
            identifier: mac-address
            mac-address: ARBITER_STORAGE_INTERFACE_MAC_ADDRESS
            type: ethernet
            state: down
          dns-resolver:
            config:
              server:
                - ACP_DNS_SERVER
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: ACP_ROUTER_ADDRESS
                next-hop-interface: ARBITER_CLUSTER_INTERFACE
                table-id: 254
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: install-config
data:
  install-config.yaml: |
    ---
    apiVersion: v1
    baseDomain: BASE_DNS_ZONE
    compute:
    - architecture: amd64
      hyperthreading: Enabled
      name: worker
      replicas: 0
    controlPlane:
      architecture: amd64
      hyperthreading: Enabled
      name: master
      replicas: 2
    arbiter:
      architecture: amd64
      hyperthreading: Enabled
      replicas: 1
      name: arbiter
    metadata:
      name: acp
    networking:
      clusterNetwork:
      - cidr: 10.128.0.0/14
        hostPrefix: 22
      machineNetwork:
      - cidr: 10.26.100.0/24
      networkType: OVNKubernetes 
      serviceNetwork:
      - 172.30.0.0/16
    platform:
      baremetal:
        apiVIPs:
          - ACP_API_IP
        ingressVIPs:
          - ACP_INGRESS_IP
    pullSecret: 'PULL_SECRET' 
    sshKey: 'SSH_KEY'
    cpuPartitioningMode: AllNodes
    capabilities:
      baselineCapabilitySet: None
      additionalEnabledCapabilities:
        - baremetal
        - Console
        - ImageRegistry
        - Storage
        - Ingress
        - NodeTuning
        - OperatorLifecycleManager
        - marketplace
    imageDigestSources:
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE/openshift-gitops-1
        source: registry.redhat.io/openshift-gitops-1
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE/openshift4
        source: registry.redhat.io/openshift4
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE/rhel9
        source: registry.redhat.io/rhel9
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE/openshift/release
        source: quay.io/openshift-release-dev/ocp-v4.0-art-dev
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE/openshift/release-images
        source: quay.io/openshift-release-dev/ocp-release
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE/ubi9
        source: registry.access.redhat.com/ubi9
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE/rhem
        source: registry.redhat.io/rhem
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE
        source: docker.io
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE/openshift4
        source: registry.redhat.io/openshift4
      - mirrors:
        - registry-registry.apps.bootstrap.BASE_DNS_ZONE/rhacm2
        source: registry.redhat.io/rhacm2
