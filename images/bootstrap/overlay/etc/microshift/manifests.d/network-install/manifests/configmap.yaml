apiVersion: v1
kind: ConfigMap
metadata:
  name: create-ocp-pxe-boot-files
data:
  create-ocp-pxe-boot-files.yaml: |
    ---
    - name: Create OpenShift pxe-boot files and setup tftp/pubsrv
      hosts:
        - localhost
      gather_facts: false
      connection: local
      vars:
        create_dir: "/tmp/install"
        input_dir: "/tmp/input"
        output_dir: "/install-resources"
        pxe_resources: "/tmp/pxe-resources"
      pre_tasks:
        - name: Check that this hasn't already been run
          ansible.builtin.stat:
            path: /pubsrv/kubeconfig
          register: _install_status
      tasks:
        - name: Create install resources
          when:
            - not _install_status.stat.exists
          block:
          - name: Create some output directories
            ansible.builtin.file:
              path: "{{ dir }}"
              state: directory
            loop:
              - "{{ output_dir }}/tftpboot"
              - "{{ output_dir }}/pubsrv"
            loop_control:
              loop_var: dir
          - name: Get registry cert
            ansible.builtin.shell:
              cmd: oc get secret harbor-nginx -n registry -o yaml | grep ca.crt | awk '{print $2}'
            register: _router_cert_raw
            changed_when: false
          - name: Extract tls.crt value
            set_fact:
              _router_tls_crt: "{{ _router_cert_raw.stdout | b64decode }}"
          - name: Write registry CA to file for openshift-install
            ansible.builtin.copy:
              content: "{{ _router_tls_crt }}"
              dest: "{{ create_dir }}/registry-ca.crt"
          - name: Slurp up install-config
            ansible.builtin.slurp:
              path: "{{ input_dir }}/install-config.yaml"
            register: _install_config
          - name: Convert install-config to yaml
            ansible.builtin.set_fact:
              _install_config_yaml: "{{ _install_config['content'] | b64decode | from_yaml }}"
          - name: Extract pull secret
            ansible.builtin.set_fact:
              _pull_secret: "{{ _install_config_yaml.pullSecret | from_json }}"
          - name: Construct bootstrap registry auth info
            ansible.builtin.set_fact:
              _new_registry_auth:
                auths:
                  'registry-registry.apps.bootstrap.BASE_DNS_ZONE':
                    auth: "{{ ('admin' ~ ':' ~ 'REGISTRY_ADMIN_PASSWORD') | b64encode }}"
          - name: Append local registry auth info
            ansible.builtin.set_fact:
              _appended_pull_secret: >-
                {{
                  {
                    'auths': _pull_secret.auths | default({}) | combine(_new_registry_auth.auths, recursive=True)
                  }
                }}
          - name: Update pull secret in install-config data
            ansible.builtin.set_fact:
              _new_install_config: "{{ _install_config_yaml | combine({'pullSecret': _appended_pull_secret | to_json}) }}"
          - name: Write out new install-config
            ansible.builtin.copy:
              content: "{{ _new_install_config | to_nice_yaml }}"
              dest: "{{ create_dir }}/install-config.yaml"
          - name: Copy agent config 
            ansible.builtin.copy:
              src: "{{ input_dir }}/agent-config.yaml"
              dest: "{{ create_dir }}/agent-config.yaml"
              remote_src: true
          - name: Add additional trust bundle
            ansible.builtin.blockinfile:
              path: "{{ create_dir }}/install-config.yaml"
              insertafter: EOF
              block: |
                additionalTrustBundle: |
                  {{ _router_tls_crt | indent(width=2) }}
          - name: Create directory for additional manifests
            ansible.builtin.file:
              path: "{{ create_dir }}/openshift"
              state: directory
          - name: Copy additional manifests to {{ create_dir }}/openshift
            ansible.builtin.copy:
              src: "{{ file }}"
              dest: "{{ create_dir }}/openshift/{{ file.split('/')[-1] }}"
              remote_src: true
            with_fileglob:
              - "{{ input_dir }}/additional-manifests/*.yaml"
            loop_control:
              loop_var: file
          - name: Print out contents of {{ create_dir }}
            ansible.builtin.shell:
              cmd: "ls -lsaht {{ create_dir }}"
            changed_when: false
          - name: Generate install media
            ansible.builtin.shell:
              cmd: "openshift-install --dir {{ create_dir }} agent create pxe-files --log-level debug"
            environment:
              SSL_CERT_FILE: "{{ create_dir }}/registry-ca.crt"
              OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: "registry-registry.apps.bootstrap.BASE_DNS_ZONE/openshift/release-images:OPENSHIFT_VERSION-x86_64"
          - name: Copy pxe resources to {{ output_dir }}/tftpboot
            ansible.builtin.copy:
              src: "{{ file }}"
              dest: "{{ output_dir }}/tftpboot/{{ file.split('/')[-1] }}"
              remote_src: true
            loop:
              - "{{ pxe_resources }}/grub.cfg"
              - "{{ pxe_resources }}/grubx64.efi"
              - "{{ pxe_resources }}/shimx64.efi"
              - "{{ create_dir }}/boot-artifacts/agent.x86_64-initrd.img"
              - "{{ create_dir }}/boot-artifacts/agent.x86_64-vmlinuz"
            loop_control:
              loop_var: file
          - name: Copy pubsrv resources to {{ output_dir }}/pubsrv
            ansible.builtin.copy:
              src: "{{ file }}"
              dest: "{{ output_dir }}/pubsrv/{{ file.split('/')[-1] }}"
              remote_src: true
            loop:
              - "{{ create_dir }}/auth/kubeconfig"
              - "{{ create_dir }}/auth/kubeadmin-password"
              - "{{ create_dir }}/boot-artifacts/agent.x86_64-rootfs.img"
            loop_control:
              loop_var: file
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: additional-manifests
data:
  04-arbiter-machineconfig.yaml: |
    ---
    # Generated by Butane; do not edit
    apiVersion: machineconfiguration.openshift.io/v1
    kind: MachineConfig
    metadata:
      labels:
        machineconfiguration.openshift.io/role: arbiter
      name: 04-arbiter-machineconfig
    spec:
      config:
        ignition:
          version: 3.5.0
        storage:
          disks:
            - device: /dev/disk/by-id/coreos-boot-disk
              partitions:
                - label: root
                  number: 4
                  resize: true
                  sizeMiB: 204800
                - label: px-metadata
                  number: 5
                  sizeMiB: 65536
                  wipePartitionEntry: true
        systemd:
          units:
            - contents: |-
                [Unit]
                Description=Wipe filesystem signatures on raw partitions
                Before=kubelet.service
                ConditionPathExists=!/var/lib/px-raw-partitions-wiped.stamp

                [Service]
                Type=oneshot
                ExecStart=-/usr/sbin/wipefs -af /dev/disk/by-partlabel/px-metadata
                ExecStartPost=/bin/touch /var/lib/px-raw-partitions-wiped.stamp
                RemainAfterExit=yes
                
                [Install]
                WantedBy=multi-user.target
              enabled: true
              name: wipe-raw-partitions.service
      kernelArguments:
        - console=ttyS0,115200n8
  05-master-machineconfig.yaml: |
    ---
    # Generated by Butane; do not edit
    apiVersion: machineconfiguration.openshift.io/v1
    kind: MachineConfig
    metadata:
      labels:
        machineconfiguration.openshift.io/role: master
      name: 05-master-disk-partitioning
    spec:
      config:
        ignition:
          version: 3.5.0
        storage:
          disks:
            - device: NODES_STORAGE_DEVICE
              partitions:
                - label: px-metadata
                  number: 1
                  sizeMiB: 65536
                  wipePartitionEntry: true
                - label: px-data
                  number: 2
                  wipePartitionEntry: true
              wipeTable: true
        systemd:
          units:
            - contents: |-
                [Unit]
                Description=Wipe filesystem signatures on raw partitions
                Before=kubelet.service
                ConditionPathExists=!/var/lib/px-raw-partitions-wiped.stamp
                
                [Service]
                Type=oneshot
                ExecStart=-/usr/sbin/wipefs -af /dev/disk/by-partlabel/px-metadata
                ExecStart=-/usr/sbin/wipefs -af /dev/disk/by-partlabel/px-data
                ExecStartPost=/bin/touch /var/lib/px-raw-partitions-wiped.stamp
                RemainAfterExit=yes
                
                [Install]
                WantedBy=multi-user.target
              enabled: true
              name: wipe-raw-partitions.service
      kernelArguments:
        - console=ttyS0,115200n8
