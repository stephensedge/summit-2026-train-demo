---
apiVersion: v1
kind: Service
metadata:
  name: dns
  labels:
    app.kubernetes.io/name: dns
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: dns
    app.kubernetes.io/part-of: bootstrap
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: dns
    app.kubernetes.io/component: dns
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53