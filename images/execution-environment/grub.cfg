# --- GLOBAL MENU SETTINGS ---
set timeout=60
set default="0"
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

# --- MENU OPTION 1 (DEFAULT): Boot Local OS ---
menuentry 'Boot Local Hard Drive (Default)' {
    echo "Exiting PXE and continuing to local boot devices..."
    exit
}

# --- MENU OPTION 2: OpenShift Installer ---
menuentry 'Josh SNUC 2NA Testing' {
    echo "Loading OpenShift Kernel..."
    linuxefi /agent.x86_64-vmlinuz coreos.live.rootfs_url=http://192.168.100.1:80/agent.x86_64-rootfs.img random.trust_cpu=on rd.luks.options=discard ignition.firstboot ignition.platform.id=metal console=ttyS0,115200n8
    echo "Loading Initial RAM Disk..."
    initrdefi /agent.x86_64-initrd.img
}
