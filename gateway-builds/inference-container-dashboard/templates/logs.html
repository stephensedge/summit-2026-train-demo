<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Log · {{ device_id }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@700;900&family=Red+Hat+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --rh-red:     #EE0000;
      --rh-black:   #151515;
      --rh-slate:   #1D2022;
      --rh-slate-2: #2A2D30;
      --rh-gray:    #6A6E73;
      --rh-gray-2:  #B8BBBE;
      --rh-cream:   #FFF;
      --rh-green:   #3E8635;
      --rh-amber:   #F0AB00;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--rh-black);
                 color: var(--rh-gray-2);
                 font-family: "Red Hat Mono", ui-monospace, monospace;
                 overflow: hidden; }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; background: var(--rh-slate);
      border-bottom: 3px solid var(--rh-red);
    }
    .title {
      font-family: "Red Hat Display", sans-serif;
      font-weight: 900; font-size: 18px;
      color: var(--rh-cream); letter-spacing: 0.02em;
    }
    .title span { color: var(--rh-red); }
    .meta {
      font-size: 11px; color: var(--rh-gray); letter-spacing: 0.12em;
      text-transform: uppercase; display: flex; align-items: center; gap: 10px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%;
           background: var(--rh-gray); }
    .dot[data-state="ok"]     { background: var(--rh-green); box-shadow: 0 0 6px var(--rh-green); }
    .dot[data-state="stale"]  { background: var(--rh-amber); }
    #term {
      height: calc(100vh - 56px);
      overflow-y: auto;
      padding: 12px 20px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .row { display: grid; grid-template-columns: 120px 1fr; gap: 12px;
           padding: 1px 0; }
    .row .t { color: var(--rh-gray); font-size: 11px; }
    .row .l { color: var(--rh-gray-2); }
    .row.trigger .l { color: var(--rh-amber); font-weight: 500; }
    .row.mqtt    .l { color: var(--rh-green); }
    .row.err     .l { color: var(--rh-red); }
    #term::-webkit-scrollbar        { width: 8px; }
    #term::-webkit-scrollbar-track  { background: var(--rh-slate); }
    #term::-webkit-scrollbar-thumb  { background: var(--rh-slate-2); border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <div class="title"><span>●</span>&nbsp;Live Inference Log · {{ device_id }}</div>
    <div class="meta">
      <span id="rate">— lines/s</span>
      <span class="dot" id="dot" data-state="stale"></span>
      <span id="status">connecting…</span>
    </div>
  </header>
  <div id="term"></div>

  <script>
    const term  = document.getElementById("term");
    const dot   = document.getElementById("dot");
    const stat  = document.getElementById("status");
    const rateEl= document.getElementById("rate");
    let lastSeq = 0;
    let lastCount = 0;
    let lastWindow = Date.now();
    let pending = 0;

    function fmtTime(iso) {
      const d = new Date(iso);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      const ms = String(d.getMilliseconds()).padStart(3, "0");
      return `${hh}:${mm}:${ss}.${ms.slice(0,2)}`;
    }

    function classify(line) {
      if (line.includes("TRIGGER!")) return "trigger";
      if (line.startsWith("MQTT") || line.includes("MQTT →")) return "mqtt";
      if (line.includes("ERROR") || line.includes("Failed")) return "err";
      return "";
    }

    function append(entries) {
      if (entries.length === 0) return;
      const atBottom = (term.scrollTop + term.clientHeight + 40) >= term.scrollHeight;
      const frag = document.createDocumentFragment();
      for (const e of entries) {
        const row = document.createElement("div");
        row.className = "row " + classify(e.line);
        const t = document.createElement("span"); t.className = "t";
        t.textContent = fmtTime(e.ts);
        const l = document.createElement("span"); l.className = "l";
        l.textContent = e.line;
        row.appendChild(t); row.appendChild(l);
        frag.appendChild(row);
      }
      term.appendChild(frag);
      while (term.childElementCount > 1200) term.removeChild(term.firstChild);
      if (atBottom) term.scrollTop = term.scrollHeight;
      pending += entries.length;
    }

    async function tick() {
      try {
        const r = await fetch(`/api/logs?since=${lastSeq}&limit=200`, { cache: "no-store" });
        if (!r.ok) throw new Error("status " + r.status);
        const j = await r.json();
        lastSeq = j.last_seq || lastSeq;
        append(j.entries || []);
        dot.dataset.state = "ok"; stat.textContent = "live";
      } catch (e) {
        dot.dataset.state = "stale"; stat.textContent = "reconnecting";
      }
    }

    setInterval(tick, 400);
    setInterval(() => {
      const now  = Date.now();
      const dt   = (now - lastWindow) / 1000;
      const rate = pending / Math.max(dt, 0.1);
      rateEl.textContent = rate.toFixed(1) + " lines/s";
      pending = 0; lastWindow = now;
    }, 1000);
    tick();
  </script>
</body>
</html>
